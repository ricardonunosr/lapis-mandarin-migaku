name: Draft Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to deploy (e.g., v1.0.0)'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./build

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; else pip install genanki; fi

      - name: Generate Anki Deck
        run: python genapkg.py "Lapis-Mandarin-Migaku-${{ github.event.inputs.version }}.apkg"

      - name: Create Draft Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: "Lapis Mandarin Migaku ${{ github.event.inputs.version }}"
          files: "build/Lapis-Mandarin-Migaku-${{ github.event.inputs.version }}.apkg"
          draft: true 
          body: |
            ## How to update Lapis Mandarin Migaku
            1. Backup your custom settings from the note's styling section.
            2. Update the template:
               - Import the `.apkg` inside Anki using the update options shown here: <img src="https://github.com/${{ github.repository }}/blob/main/assets/import_options.png" alt="import options">
               - Alternatively, manually update your card templates by selecting a card, clicking **Cards...**, and copying the contents of `front.html`, `back.html`, and `styling.css` from the source files. Save to apply.
            3. Paste your custom settings back into the top of the note's styling.